<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EstateAI | Bhubaneswar Real Estate Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bg-dark: #020617;
        --bg-accent: #0f172a;
        --primary: #38bdf8;
        --secondary: #f97316;
        --text-main: #e2e8f0;
        --text-dim: #94a3b8;
      }

      body {
        margin: 0;
        background: 
          radial-gradient(circle at top left, rgba(14, 165, 233, 0.15), transparent 40%),
          radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.1), transparent 40%),
          linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-accent) 100%);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Loader Overlay */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        color: var(--text-main);
        font-family: 'Manrope', sans-serif;
        z-index: 9999;
        background: var(--bg-dark);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #app-loader.app-loader-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Logo Container with Pulse */
      .app-loader-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        border-radius: 24px;
        border: 1px solid rgba(56, 189, 248, 0.3);
        background: rgba(15, 23, 42, 0.8);
        box-shadow: 0 0 30px rgba(14, 165, 233, 0.2);
        font-size: 32px;
        animation: logo-pulse 2s infinite ease-in-out;
      }

      @keyframes logo-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(14, 165, 233, 0.2); }
        50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(14, 165, 233, 0.4); }
      }

      /* Modern Spinner */
      .app-loader-spin {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid rgba(148, 163, 184, 0.1);
        border-top-color: var(--primary);
        animation: app-spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      @keyframes app-spin {
        to { transform: rotate(360deg); }
      }

      /* Text Animations */
      .text-container {
        text-align: center;
      }

      .app-loader-title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        background: linear-gradient(to right, #fff, var(--primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }

      .app-loader-subtitle {
        font-size: 14px;
        color: var(--text-dim);
        transition: all 0.3s ease;
      }

      #root {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-live="polite">
      <div class="app-loader-mark">
        <span style="filter: drop-shadow(0 0 8px var(--primary));">🏠</span>
      </div>
      
      <div class="app-loader-spin"></div>
      
      <div class="text-container">
        <div class="app-loader-title">EstateAI</div>
        <div id="loader-status" class="app-loader-subtitle">Initialising Smart Advisor...</div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      const statusElement = document.getElementById('loader-status');

      // Sequence of messages to keep the user engaged during the 502/Cold Start period
      const messages = [
        { time: 3000, text: "Connecting to secure cloud..." },
        { time: 2500, text: "Waking up AI models" },
        { time: 2500, text: "Finalising your workspace..." }
      ];

      messages.forEach(msg => {
        setTimeout(() => {
          if (statusElement) {
            statusElement.style.opacity = 0;
            setTimeout(() => {
              statusElement.innerText = msg.text;
              statusElement.style.opacity = 1;
            }, 300);
          }
        }, msg.time);
      });

      // This function can be called from your main.jsx once the data is loaded
      window.hideAppLoader = function() {
        const loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('app-loader-hidden');
        }
      };
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
